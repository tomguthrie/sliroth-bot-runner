name: build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
  workflow_dispatch: {}
  schedule:
    # Weekly rebuild to pick up base-image security updates
    - cron: "0 6 * * 1"

env:
  IMAGE: ghcr.io/tomguthrie/sliroth-bot-runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive tags from base runner version
        id: meta
        run: |
          version="$(grep -oP 'actions-runner:\K[0-9.]+' Dockerfile)"
          echo "tags=${IMAGE}:latest,${IMAGE}:${version},${IMAGE}:${version}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report digest
        run: |
          echo "Published \`${IMAGE}@${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Pin this in the olympus sliroth-bot runner HelmRelease." >> "$GITHUB_STEP_SUMMARY"
